services:
  - type: web
    name: ai-resume-matcher
    env: python
    runtime: python-3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --max-requests 100 app:app
    envVars:
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
    healthCheckPath: /
    disk:
      name: resume-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
